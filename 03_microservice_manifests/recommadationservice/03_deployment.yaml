apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommadationservice
  labels:
    app.kubernetes.io/name: recommadationservice
    app.kubernetes.io/instance: recommadationservice
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: online-boutique
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: recommadationservice
      app.kubernetes.io/instance: recommadationservice
      app.kubernetes.io/component: service
      app.kubernetes.io/owner: online-boutique
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommadationservice
        app.kubernetes.io/instance: recommadationservice
        app.kubernetes.io/component: service
        app.kubernetes.io/owner: online-boutique
    spec:
      serviceAccountName: recommadationservice
      securityContext:
        fsGroup: 1000
      containers:
        - name: recommadationservice
          envFrom:
            - configMapRef:
                name: recommadationservice
          securityContext:
            capabilities:
              add:
              - NET_BIND_SERVICE
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: 927749346049.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique/recommendationservice:v0.0
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8080
          readinessProbe:
            periodSeconds: 5
            grpc:
              port: 8080
          livenessProbe:
            periodSeconds: 5
            grpc:
              port: 8080
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 128m
              memory: 512Mi
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory

