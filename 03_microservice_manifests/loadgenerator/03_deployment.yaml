apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
  labels:
    app.kubernetes.io/name: loadgenerator
    app.kubernetes.io/instance: loadgenerator
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: online-boutique
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: loadgenerator
      app.kubernetes.io/instance: loadgenerator
      app.kubernetes.io/component: service
      app.kubernetes.io/owner: online-boutique
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loadgenerator
        app.kubernetes.io/instance: loadgenerator
        app.kubernetes.io/component: service
        app.kubernetes.io/owner: online-boutique
    spec:
      serviceAccountName: loadgenerator
      securityContext:
        fsGroup: 1000
      containers:
        - name: loadgenerator
          envFrom:
            - configMapRef:
                name: loadgenerator
          securityContext:
            capabilities:
              add:
              - NET_BIND_SERVICE
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: 927749346049.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique/loadgenerator:v0.0
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8089
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 128m
              memory: 512Mi
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory

