apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  labels:
    app.kubernetes.io/name: adservice
    app.kubernetes.io/instance: adservice
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: online-boutique
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: adservice
      app.kubernetes.io/instance: adservice
      app.kubernetes.io/component: service
      app.kubernetes.io/owner: online-boutique
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adservice
        app.kubernetes.io/instance: adservice
        app.kubernetes.io/component: service
        app.kubernetes.io/owner: online-boutique
    spec:
      serviceAccountName: adservice
      securityContext:
        fsGroup: 1000
      containers:
        - name: adservice
          envFrom:
            - configMapRef:
                name: adservice
          securityContext:
            capabilities:
              add:
              - NET_BIND_SERVICE
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: 927749346049.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique/adservice:v0.0
          imagePullPolicy: IfNotPresent
          ports:
          - name: grpc
            containerPort: 9555
            protocol: TCP
          readinessProbe:
            grpc:
              port: 9555
          livenessProbe:
            grpc:
              port: 9555
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 128m
              memory: 512Mi
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory

